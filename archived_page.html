<!DOCTYPE html>

<xsl:template match = "/icestats">
<html xmlns="http://www.w3.org/1999/xhtml">



<html>
<head>
	<script src="https://code.jquery.com/jquery-2.2.4.min.js"></script>
	<title>HBNI Audio Streaming Service</title>
	<link rel="stylesheet" type="text/css" href="style.css?1" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
	<link rel="shortcut icon" href="favicon.ico" >
		
	<style>
		
button {
  background-color: #4CAF50; /* Green */
  border: 2px solid #f44336;
  border-radius: 25px;		
  color: white;
  padding: 15px 32px;
  text-align: center;
  text-decoration: none;
  display: inline-block;
  font-size: 16px;
}
		
button1 {
  background-color: #A30A0D;
  border-radius: 25px;		
  color: white;
  padding: 15px 32px;
  text-align: center;
  text-decoration: none;
  display: inline-block;
  font-size: 16px;		
		}
h2{
	background-color: #00cccc;
	padding: 6px;
	border: 2px solid red;
		}
h4{
	background-color: #CFD103;
	padding: 8px;
	border: 2px solid red;
	
	
		}




.event {border-top: 2px solid white;}
#logo {text-align: center;}
#logo img {width: max=20%;}
#header	{padding: 10px auto 10px auto; text-align: center;}

	
@media (max-width: 600px) {
	#header {font-size: 20px;}
}
	
	</style>
</head>
	<body>
<div id="logo">
   <img src="/hbnilogo.png">
</div>

	<h1 id="header">HBNI Audio Streaming Service </br> Listeners Page </h1>
	<!--index header menu -->
	<div id="menu">
		
	    <br/>
		<p>Now Playing</p>
		<h2 id="nowplaying">No Stream Selected</h2>	
	


		<br/>	

	
<div id="audio">
	<audio controls="" preload="none" autoplay="" name="media">
		<source src="http://hbniaudio.hbni.net:8000" type="audio/mp3">
  		Your browser does not support the audio element.
	</audio>


</div>

		<p>Please Select the Stream You Wish to Listen to.<p>
		
No streams currently online.	<h4 id="events">Upcoming Events</h4>
	
	<div class="event">
		<h3>No Upcoming Events at this Time</h3>
	</div>

	</body>
				<script type="text/javascript">
					$('.change-stream').on('click',function(e){
					$("audio").attr('src', "http://hbniaudio.hbni.net:8000"+$(e.target).data('mnt'));
					$("audio")[0].load();
        			$("audio")[0].play();
        			let streamName=$(e.target).data('stream');
        			$("#nowplaying").text(streamName);
                });		
	
				
					
									
</script>


 
</html>
